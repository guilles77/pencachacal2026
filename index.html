<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#100b12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Penca Chacal">
  <title>Penca Mundial 2026 - Los Chacales</title>
  <style>
    :root{
      --bg:#060407;
      --bg2:#100b12;
      --panel:rgba(20,17,27,.82);
      --panel2:rgba(31,24,41,.82);
      --card:#15101c;
      --line:rgba(255,196,214,.16);
      --line2:rgba(255,105,158,.42);
      --pink:#ff669b;
      --pink2:#ffa0c0;
      --rose:#c68ca4;
      --text:#fff5f8;
      --muted:#d7afc0;
      --muted2:#a98b9a;
      --good:#9effca;
      --warn:#ffd68f;
      --bad:#ff9aa9;
      --shadow:0 30px 90px rgba(0,0,0,.42);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:auto}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% -12%, rgba(255,102,155,.26), transparent 32rem),
        radial-gradient(circle at 90% 2%, rgba(255,160,192,.18), transparent 34rem),
        radial-gradient(circle at 48% 112%, rgba(124,70,94,.24), transparent 36rem),
        linear-gradient(135deg,#050306 0%,#120b14 52%,#050306 100%);
    }
    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(110deg, transparent 0 18%, rgba(255,102,155,.06) 18% 19%, transparent 19% 40%, rgba(255,102,155,.04) 40% 41%, transparent 41% 100%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 8px);
      mix-blend-mode:screen;
    }
    button,input,select,textarea{font:inherit}
    a{color:var(--pink2); text-decoration:none}
    a:hover{text-decoration:underline}
    button,.button-like{
      appearance:none;
      border:1px solid rgba(255,102,155,.52);
      background:linear-gradient(180deg,rgba(255,102,155,.22),rgba(255,102,155,.09));
      color:var(--text);
      padding:.78rem 1rem;
      border-radius:999px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:.5rem;
      font-weight:800;
      box-shadow:0 14px 42px rgba(255,102,155,.11);
      transition:.18s ease;
      white-space:nowrap;
    }
    button:hover,.button-like:hover{transform:translateY(-1px); border-color:var(--pink); background:rgba(255,102,155,.24); text-decoration:none}
    button:disabled,select:disabled,input:disabled,textarea:disabled{opacity:.5; cursor:not-allowed; transform:none!important}
    button.ghost{border-color:rgba(255,245,248,.18); background:rgba(255,255,255,.045); box-shadow:none}
    button.danger{border-color:rgba(255,154,169,.7); background:rgba(255,154,169,.14)}
    button.good{border-color:rgba(158,255,202,.58); background:rgba(158,255,202,.12)}
    button.small{padding:.48rem .72rem; font-size:.86rem}
    input,select,textarea{
      width:100%;
      border:1px solid rgba(255,245,248,.14);
      background:rgba(5,4,8,.72);
      color:var(--text);
      border-radius:15px;
      padding:.72rem .82rem;
      outline:none;
    }
    input:focus,select:focus,textarea:focus{border-color:var(--pink); box-shadow:0 0 0 4px rgba(255,102,155,.13)}
    input[type="number"]{width:4.3rem; text-align:center; padding:.58rem .45rem}
    textarea{min-height:170px; resize:vertical; line-height:1.45}
    .shell{width:min(1520px,calc(100vw - 28px)); margin:0 auto; padding:22px 0 56px; position:relative; z-index:1}
    .hero{
      display:grid;
      grid-template-columns:112px 1fr auto;
      gap:20px;
      align-items:center;
      padding:22px;
      border:1px solid rgba(255,102,155,.32);
      border-radius:32px;
      background:
        linear-gradient(120deg,rgba(0,0,0,.72),rgba(30,22,38,.87)),
        repeating-linear-gradient(110deg,transparent 0 52px,rgba(255,102,155,.06) 52px 74px);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .hero:after{
      content:"";
      position:absolute;
      width:360px;height:360px;right:-130px;top:-160px;border-radius:50%;
      background:radial-gradient(circle,rgba(255,102,155,.32),transparent 62%);
      pointer-events:none;
    }
    .logo{
      width:112px;height:112px;border-radius:28px;overflow:hidden;background:#000;
      border:1px solid rgba(255,102,155,.58);
      box-shadow:0 22px 70px rgba(255,102,155,.18);
    }
    .logo img{width:100%;height:100%;object-fit:cover;display:block}
    .eyebrow{margin:0 0 8px;letter-spacing:.18em;text-transform:uppercase;color:var(--pink2);font-weight:950;font-size:.74rem}
    h1{font-size:clamp(2rem,4.4vw,5.15rem);line-height:.9;margin:0;letter-spacing:.015em}
    h2{margin:.2rem 0 .9rem;font-size:clamp(1.25rem,2vw,2rem)}
    h3{margin:.15rem 0 .7rem}
    p{line-height:1.5}
    .desc{margin:12px 0 0;color:var(--muted);max-width:84ch}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;position:relative;z-index:1}
    .tabs{
      margin:18px 0;
      padding:8px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      border:1px solid rgba(255,245,248,.09);
      border-radius:999px;
      background:rgba(255,255,255,.035);
      backdrop-filter:blur(16px);
      position:sticky;top:8px;z-index:20;
    }
    .tab-btn{box-shadow:none;padding:.68rem .96rem;border-color:transparent;background:transparent;color:var(--muted)}
    .tab-btn.active{color:var(--text);border-color:rgba(255,102,155,.58);background:rgba(255,102,155,.16)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .grid{display:grid;gap:16px}
    .two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .four{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card,details{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:linear-gradient(180deg,var(--panel),rgba(14,10,18,.72));
      box-shadow:0 18px 62px rgba(0,0,0,.24);
      padding:18px;
      overflow:hidden;
    }
    .card.glow{border-color:rgba(255,102,155,.32);box-shadow:0 20px 80px rgba(255,102,155,.10), 0 18px 62px rgba(0,0,0,.24)}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .space{justify-content:space-between}
    .muted{color:var(--muted)}
    .tiny{font-size:.86rem}
    .pill{
      display:inline-flex;align-items:center;gap:.36rem;
      padding:.32rem .66rem;border-radius:999px;
      border:1px solid rgba(255,102,155,.32);
      background:rgba(255,102,155,.10);
      color:var(--pink2);font-weight:900;font-size:.78rem;
    }
    .pill.good{border-color:rgba(158,255,202,.38);background:rgba(158,255,202,.10);color:var(--good)}
    .pill.warn{border-color:rgba(255,214,143,.40);background:rgba(255,214,143,.10);color:var(--warn)}
    .pill.bad{border-color:rgba(255,154,169,.42);background:rgba(255,154,169,.10);color:var(--bad)}
    .empty{text-align:center;padding:34px;border:1px dashed rgba(255,245,248,.22);border-radius:22px;color:var(--muted);background:rgba(255,255,255,.025)}
    .progress{height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
    .progress span{height:100%;display:block;border-radius:999px;background:linear-gradient(90deg,var(--pink),var(--pink2))}
    summary{cursor:pointer;list-style:none;font-weight:950;font-size:1.08rem;display:flex;justify-content:space-between;align-items:center}
    summary::-webkit-details-marker{display:none}
    summary:after{content:"+";color:var(--pink2);font-size:1.5rem;line-height:1}
    details[open] summary:after{content:"–"}
    details{margin-top:16px;padding:0}
    summary{padding:18px}
    .details-body{padding:0 18px 18px}
    .group-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .group-card,.standings-card,.match-card{
      border:1px solid rgba(255,245,248,.12);
      background:rgba(255,255,255,.035);
      border-radius:20px;
      padding:14px;
    }
    .group-title{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
    .team-list{font-size:.78rem;color:var(--muted);line-height:1.45}
    .team-chip{display:inline-flex;align-items:center;gap:.42rem;vertical-align:middle;min-width:0;max-width:100%}
    .team-chip .team-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .flag-img{display:none}
    .flag-fallback{min-width:2.55em;height:1.48em;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,102,155,.13);border:1px solid rgba(255,102,155,.42);box-shadow:0 0 0 1px rgba(255,255,255,.05) inset;font-size:.66em;font-weight:950;color:var(--pink2);letter-spacing:.055em;padding:0 .38em;line-height:1;flex:0 0 auto;text-transform:uppercase}
    .fixture{display:grid;grid-template-columns:1fr auto auto auto 1fr;gap:8px;align-items:center;margin:8px 0}
    .fixture .home{text-align:right}.fixture .away{text-align:left}.dash{color:var(--muted2);font-weight:950}
    table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;font-size:.92rem}
    th,td{padding:.62rem .58rem;border-bottom:1px solid rgba(255,245,248,.08);text-align:left;vertical-align:middle}
    th{color:var(--muted);font-size:.76rem;text-transform:uppercase;letter-spacing:.08em}
    tr.advance td:first-child{border-left:3px solid var(--good)}
    tr.third td:first-child{border-left:3px solid var(--warn)}
    tr.out{opacity:.6}
    .standings-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .bracket{display:grid;grid-template-columns:repeat(5,minmax(250px,1fr));gap:12px;overflow:auto;padding-bottom:8px}
    .round-title{font-weight:950;color:var(--pink2);letter-spacing:.04em;margin:0 0 10px;padding-left:4px}
    .match-card{margin-bottom:10px;min-width:250px}
    .match-head{display:flex;justify-content:space-between;color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .team-line{display:flex;justify-content:space-between;gap:8px;padding:.45rem .55rem;border-radius:12px;background:rgba(0,0,0,.20);margin:5px 0;min-height:34px}
    .team-line.winner{border:1px solid rgba(158,255,202,.35);background:rgba(158,255,202,.10)}
    .match-card select{margin-top:8px}
    .mini-details{margin-top:8px;padding:0;border-radius:14px;background:rgba(0,0,0,.16)}
    .mini-details summary{padding:10px;font-size:.88rem;color:var(--muted)}
    .mini-details .details-body{padding:0 10px 10px}
    .award-grid,.settings-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    label{display:flex;flex-direction:column;gap:6px;color:var(--muted);font-size:.88rem;font-weight:800}
    .score-table-wrap{overflow:auto}
    .status-dot{width:10px;height:10px;border-radius:50%;background:var(--muted2);display:inline-block}
    .status-dot.on{background:var(--good);box-shadow:0 0 0 4px rgba(158,255,202,.12)}
    .copy-box{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.82rem;word-break:break-all;background:rgba(0,0,0,.32);padding:.7rem;border-radius:14px;border:1px solid rgba(255,245,248,.10)}
    .toast{
      position:fixed;right:18px;bottom:18px;z-index:1000;max-width:min(460px,calc(100vw - 36px));
      padding:14px 16px;border-radius:18px;border:1px solid rgba(255,102,155,.36);
      background:rgba(18,12,22,.94);box-shadow:var(--shadow);display:none;
    }
    .toast.show{display:block}

    .diagnostic-pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.38);border:1px solid rgba(255,245,248,.12);border-radius:16px;padding:14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.82rem;line-height:1.45;max-height:420px;overflow:auto}
    .error-card{border-color:rgba(255,154,169,.55)!important;background:linear-gradient(180deg,rgba(82,21,37,.64),rgba(20,10,18,.78))!important}
    .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    @media (max-width:720px){
      body{font-size:16px}
      .shell{width:100%;padding:8px 8px 32px}
      .hero{gap:12px;padding:14px;border-radius:22px}
      .logo{width:74px;height:74px;border-radius:18px}
      .desc{font-size:.94rem}
      .hero-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
      .hero-actions>*{min-width:0}
      .tabs{position:sticky;top:0;z-index:30;margin:10px -8px 12px;padding:8px;border-radius:0;background:rgba(8,5,10,.92);backdrop-filter:blur(18px);flex-wrap:nowrap}
      .tab-btn{flex:0 0 auto;padding:.62rem .78rem;font-size:.92rem}
      .card,details{padding:12px;border-radius:18px}
      summary{padding:13px;font-size:1rem}
      .details-body{padding:0 12px 12px}
      .fixture{grid-template-columns:minmax(0,1fr) 3.7rem .7rem 3.7rem minmax(0,1fr);gap:5px;font-size:.86rem}
      input[type="number"]{width:3.7rem;min-width:3.7rem;padding:.52rem .3rem}
      .team-chip{gap:.25rem;min-width:0}.team-chip span:last-child{overflow:hidden;text-overflow:ellipsis}
      table{min-width:560px}.score-table-wrap{overflow:auto;-webkit-overflow-scrolling:touch}
      .bracket{grid-template-columns:repeat(5,minmax(230px,82vw));gap:10px}
      .match-card{min-width:230px}
      button,.button-like{padding:.7rem .82rem}
      .row{gap:8px}.row>button{flex:1 1 auto}
    }

    @media (max-width:1100px){.hero{grid-template-columns:92px 1fr}.logo{width:92px;height:92px}.hero-actions{grid-column:1/-1;justify-content:flex-start}.group-grid,.standings-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.two,.three,.four{grid-template-columns:1fr 1fr}.award-grid,.settings-grid{grid-template-columns:1fr 1fr}}
    @media (max-width:720px){.shell{width:min(100vw - 18px,1520px);padding-top:10px}.hero{grid-template-columns:1fr;text-align:left;border-radius:24px}.tabs{position:static;border-radius:22px}.tab-btn{flex:1 1 auto}.group-grid,.standings-grid,.two,.three,.four,.award-grid,.settings-grid{grid-template-columns:1fr}.fixture{grid-template-columns:1fr auto auto auto 1fr;font-size:.9rem}.hero-actions{justify-content:stretch}.hero-actions>*{flex:1}.card,details{border-radius:18px;padding:14px}summary{padding:14px}.details-body{padding:0 14px 14px}}

    /* v7: mejoras de mobile y bracket compacto */
    .use-steps{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}
    .use-step{border:1px solid rgba(255,245,248,.12);background:rgba(255,255,255,.035);border-radius:18px;padding:12px}
    .use-step strong{display:block;color:var(--text);margin-bottom:4px}
    .bracket.compact{grid-template-columns:minmax(280px,1.12fr) minmax(260px,1fr) minmax(250px,.95fr) minmax(240px,.9fr) minmax(240px,.9fr);align-items:start;gap:10px;scroll-snap-type:x proximity}
    .round-col{display:grid;gap:8px;align-content:start;scroll-snap-align:start}
    .match-card.compact{min-width:0;margin:0;padding:10px;border-radius:16px}
    .match-card.compact .match-head{margin-bottom:6px}
    .match-body{display:grid;gap:6px}
    .versus-line{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:6px;align-items:center;font-size:.84rem}
    .versus-line .side{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:.38rem .45rem;border-radius:11px;background:rgba(0,0,0,.20);border:1px solid transparent}
    .versus-line .side.winner{border-color:rgba(158,255,202,.35);background:rgba(158,255,202,.10);color:var(--good)}
    .versus-line .vs{font-weight:950;color:var(--muted2);font-size:.75rem}
    .match-card.compact select{margin-top:0;padding:.5rem .62rem;border-radius:12px;font-size:.86rem}
    .match-card.compact .mini-details{margin-top:6px}
    .quick-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .admin-logged{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
    @media (max-width:900px){.use-steps{grid-template-columns:1fr}.bracket.compact{grid-template-columns:repeat(5,minmax(84vw,84vw));overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px}.versus-line{font-size:.82rem}}
    @media (max-width:720px){body{font-size:16px}.shell{width:100%;padding:8px 8px 32px}.hero{grid-template-columns:72px minmax(0,1fr);gap:10px;padding:12px;border-radius:22px}.hero .logo{width:72px;height:72px;border-radius:18px}.hero h1{font-size:2.05rem;line-height:.95}.eyebrow{font-size:.66rem;margin-bottom:6px}.desc{font-size:.9rem;line-height:1.38}.hero-actions{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;width:100%;gap:8px}.hero-actions a,.hero-actions button{width:100%;padding:.7rem .65rem}.tabs{position:sticky!important;top:0;z-index:50;margin:10px -8px 12px!important;padding:8px!important;border-radius:0!important;background:rgba(8,5,10,.94)!important;backdrop-filter:blur(18px);flex-wrap:nowrap!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab-btn{flex:0 0 auto!important;padding:.64rem .82rem;font-size:.93rem}.group-grid,.standings-grid,.two,.three,.four,.award-grid,.settings-grid{grid-template-columns:1fr!important}.card,details{border-radius:18px;padding:13px}summary{padding:13px;font-size:1rem}.details-body{padding:0 13px 13px}.fixture{grid-template-columns:minmax(0,1fr) 3.45rem .6rem 3.45rem minmax(0,1fr);gap:4px;font-size:.82rem}input[type="number"]{width:3.45rem;min-width:3.45rem;padding:.5rem .2rem}table{font-size:.84rem}.score-table-wrap{overflow:auto;-webkit-overflow-scrolling:touch}.row>button{flex:1 1 auto}.copy-box{font-size:.74rem}}

    /* v7 final horizontal bracket rows */
    .bracket.compact{display:grid;grid-template-columns:repeat(5,minmax(240px,1fr));gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;padding-bottom:8px}
    .round-col{min-width:240px;display:grid;gap:8px;align-content:start;scroll-snap-align:start}
    .round-col .round-title{position:sticky;top:0;z-index:4;background:linear-gradient(180deg,rgba(21,16,28,.97),rgba(21,16,28,.86));border:1px solid rgba(255,102,155,.22);border-radius:16px;padding:.7rem .8rem;color:var(--pink2);text-align:center;font-weight:950;box-shadow:0 10px 24px rgba(0,0,0,.22)}
    .bracket.compact .match-card.compact{min-width:0;width:100%;margin:0;padding:10px;border-radius:16px}
    @media (max-width:900px){.bracket.compact{grid-template-columns:repeat(5,minmax(78vw,78vw));gap:10px}.round-col{min-width:78vw}}
    @media (max-width:720px){.bracket.compact{grid-template-columns:repeat(5,minmax(86vw,86vw));margin-left:-2px;margin-right:-2px}.round-col{min-width:86vw}.round-col .round-title{top:54px}.match-card.compact select{font-size:.95rem;min-height:44px}.versus-line{grid-template-columns:minmax(0,1fr) 28px minmax(0,1fr)}}


    /* v9: mata-mata por fases apiladas: 16avos, debajo octavos, luego cuartos, semis y final */
    .bracket.compact.stacked{
      display:grid!important;
      grid-template-columns:1fr!important;
      gap:18px!important;
      overflow:visible!important;
      scroll-snap-type:none!important;
      padding-bottom:0!important;
      margin-top:12px;
    }
    .bracket.compact.stacked .round-col{
      min-width:0!important;
      width:100%!important;
      display:block!important;
      scroll-snap-align:none!important;
      border:1px solid rgba(255,102,155,.18);
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025));
      border-radius:22px;
      padding:12px;
    }
    .bracket.compact.stacked .round-col .round-title{
      position:sticky!important;
      top:10px!important;
      z-index:5;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:0 0 12px;
      padding:.78rem .9rem;
      text-align:left;
      background:linear-gradient(135deg,rgba(62,28,46,.98),rgba(18,12,22,.94));
      border:1px solid rgba(255,102,155,.28);
      border-radius:16px;
      box-shadow:0 12px 32px rgba(0,0,0,.24);
    }
    .round-title .round-count{
      color:var(--muted);
      font-size:.76rem;
      letter-spacing:.03em;
      font-weight:900;
      white-space:nowrap;
    }
    .round-matches{
      display:grid;
      grid-template-columns:repeat(4,minmax(220px,1fr));
      gap:10px;
      align-items:start;
    }
    .round-r16 .round-matches{grid-template-columns:repeat(4,minmax(220px,1fr))}
    .round-qf .round-matches{grid-template-columns:repeat(4,minmax(210px,1fr))}

function renderDeadlineHomeStat(deadline) {

    return '<div class="v16-home-stat deadline-stat"><div class="deadline-mini"><span class="deadline-label">Fecha límite</span><strong class="deadline-date">' + esc(parts.date) + '</strong><span class="deadline-time">' + esc(parts.time) + '</span><span class="deadline-state-line"><span class="pill ' + stateClass + '">' + state + '</span></span></div></div>';
}
function deadlineDisplayParts(value) {
    var raw = String(value || '').trim();
    var d = parseFlexibleDateTime(raw);
    if (!raw) return { date:'Sin configurar', time:'' };
    if (!d) return { date:raw, time:'Formato no reconocido. Usar AAAA-MM-DDTHH:mm:ss-03:00' };
    try {
        var date = new Intl.DateTimeFormat('es-UY', { day:'2-digit', month:'short', year:'numeric', timeZone:'America/Montevideo' }).format(d).replace(/\./g, '');
        var time = new Intl.DateTimeFormat('es-UY', { hour:'2-digit', minute:'2-digit', hour12:false, timeZone:'America/Montevideo' }).format(d);
        return { date:date, time:time + ' · Uruguay (GMT-03)' };
    } catch (e) {
        return { date:formatDate(d.toISOString()).split(',')[0] || raw, time:'Hora local' };
    }
}

function scoreCompleteObj(score) {
    return !!score && score.homeGoals !== '' && score.awayGoals !== '' && score.homeGoals != null && score.awayGoals != null;
}

function detailedMissingPredictionItems(entry) {
    entry = normalizeEntry(entry);
    var out = [];
    orderedGroupMatches().forEach(function (m) {
        var s = entry.groupScores[m.id] || {};
        if (!scoreCompleteObj(s)) {
            out.push({ type: 'group-score', section: 'groups', id: m.id, label: 'Grupo ' + m.group + ' · Partido ' + m.matchNo, detail: teamLabel(m.home) + ' vs ' + teamLabel(m.away), focus: '[data-score-match="' + m.id + '"]' });
        }
    });
    var bracket = buildBracket(entry);
    KO_ROUNDS.forEach(function (round) {
        (bracket.rounds[round] || []).forEach(function (m) {
            if (!isConcreteTeam(m.home) || !isConcreteTeam(m.away) || m.home === m.away) return;
            var s = (entry.knockoutScores && entry.knockoutScores[m.id]) || {};
            if (!scoreCompleteObj(s)) {
                out.push({ type: 'ko-score', section: 'knockout', id: m.id, label: (ROUND_LABELS[round] || round) + ' · ' + m.label, detail: 'Falta marcador: ' + teamLabel(m.home) + ' vs ' + teamLabel(m.away), focus: '[data-ko-score="' + m.id + '"]' });
            }
            if (!validWinner(entry, m)) {
                out.push({ type: 'ko-winner', section: 'knockout', id: m.id, label: (ROUND_LABELS[round] || round) + ' · ' + m.label, detail: 'Falta elegir quién clasifica', focus: '[data-ko-match="' + m.id + '"]' });
            }
        });
    });
    AWARD_FIELDS.forEach(function (a) {
        var key = a[0], label = a[1];
        if (!String((entry.awards || {})[key] || '').trim()) {
            out.push({ type: 'award', section: 'awards', id: key, label: 'Premio · ' + label, detail: 'Falta completar ' + label.toLowerCase(), focus: '[data-award="' + key + '"]' });
        }
    });
    return out;
}

function buildRankingEvolution(predictions, players, actual) {
